<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sacred Geometry Evolver</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #020202;
      font-family: Inter, system-ui, sans-serif;
    }
    canvas { display:block; width:100vw; height:100vh; }
    .hud {
      position: fixed;
      left: 16px;
      bottom: 14px;
      color: rgba(236,236,236,.7);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      mix-blend-mode: screen;
      pointer-events: none;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">Sacred Geometry · Surface Tension · Attractors · 15s Illusion Pulse</div>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });

  let w = 0, h = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
  const TAU = Math.PI * 2;
  let t0 = performance.now();

  function resize() {
    w = Math.floor(window.innerWidth);
    h = Math.floor(window.innerHeight);
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const smooth = (a, b, k) => a + (b - a) * k;
  const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

  const attractors = Array.from({ length: 4 }, (_, i) => ({
    x: 0, y: 0, z: 0,
    phase: i * 1.2,
    ring: 0.2 + i * 0.15
  }));

  const particles = Array.from({ length: 520 }, (_, i) => ({
    x: (Math.random() - 0.5) * 2,
    y: (Math.random() - 0.5) * 2,
    z: Math.random() * 2 + 0.2,
    vx: 0, vy: 0, vz: 0,
    life: Math.random(),
    kind: i % 4,
    seed: Math.random() * 999
  }));

  function updateAttractors(t) {
    attractors.forEach((a, i) => {
      const r = 0.22 + 0.12 * Math.sin(t * 0.23 + i);
      a.x = r * Math.cos(t * (0.32 + i * 0.04) + a.phase);
      a.y = r * Math.sin(t * (0.28 + i * 0.03) + a.phase * 1.3);
      a.z = 0.55 + 0.28 * Math.sin(t * 0.39 + i * 0.7);
    });
  }

  function project(p) {
    const fov = 1.1;
    const z = p.z + 1.7;
    const s = fov / z;
    return {
      x: w * 0.5 + p.x * h * s,
      y: h * 0.5 + p.y * h * s,
      s,
      z
    };
  }

  function drawRibbon(t, illusion) {
    const lines = 42;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    for (let i = 0; i < lines; i++) {
      const yN = i / (lines - 1) - 0.5;
      const amp = 0.07 + 0.02 * Math.sin(t * 0.4 + i * 0.31);
      ctx.beginPath();
      for (let x = 0; x <= w; x += 14) {
        const nx = x / w - 0.5;
        const wave = Math.sin((nx * 11.0 + t * 0.6) + yN * 5.5) * amp;
        const twist = Math.sin(nx * 19 - t * 0.8 + i * 0.15) * amp * 0.65;
        const iy = h * (0.5 + yN + wave + twist);
        if (x === 0) ctx.moveTo(x, iy);
        else ctx.lineTo(x, iy);
      }
      const base = 14 + Math.sin(i * 2.1 + t) * 8;
      const alpha = 0.035 + 0.04 * illusion;
      ctx.strokeStyle = `rgba(${base},${base},${base},${alpha})`;
      ctx.lineWidth = 1.8 + illusion * 1.2;
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawGeometryField(t, illusion) {
    ctx.save();
    ctx.translate(w / 2, h / 2);
    const layers = 14;
    for (let i = 0; i < layers; i++) {
      const p = i / (layers - 1);
      const radius = h * (0.09 + p * 0.36);
      const rot = t * (0.05 + p * 0.03) * (i % 2 ? -1 : 1);
      const points = 6 + (i % 4) * 2;
      const fade = Math.pow(1 - p, 1.3) * (0.22 + illusion * 0.4);
      ctx.strokeStyle = `rgba(215, 220, 235, ${fade})`;
      ctx.lineWidth = 0.9 + (1 - p) * 1.6;
      ctx.beginPath();
      for (let k = 0; k <= points; k++) {
        const a = (k / points) * TAU + rot;
        const rr = radius * (1 + 0.08 * Math.sin(a * 3 + t * 0.7));
        const x = Math.cos(a) * rr;
        const y = Math.sin(a) * rr;
        if (k === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  function stepParticles(t, dt, illusion) {
    const tension = 0.35;
    for (const p of particles) {
      let ax = 0, ay = 0, az = 0;

      for (const a of attractors) {
        const dx = a.x - p.x;
        const dy = a.y - p.y;
        const dz = a.z - p.z;
        const d2 = dx * dx + dy * dy + dz * dz + 0.001;
        const force = 0.0028 / d2;
        ax += dx * force;
        ay += dy * force;
        az += dz * force;
      }

      const r = Math.hypot(p.x, p.y);
      const target = 0.35 + 0.15 * Math.sin(t * 0.26 + p.seed);
      const surf = (target - r) * tension;
      if (r > 0.0001) {
        ax += (p.x / r) * surf * -0.008;
        ay += (p.y / r) * surf * -0.008;
      }

      p.vx = (p.vx + ax * dt) * 0.985;
      p.vy = (p.vy + ay * dt) * 0.985;
      p.vz = (p.vz + az * dt + 0.00055) * 0.987;

      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.z += p.vz * dt;

      if (p.z > 2.6) {
        p.z = 0.15;
        p.x *= 0.28;
        p.y *= 0.28;
        p.life = 0;
      }

      p.life = clamp(p.life + dt * 0.00033, 0, 1);

      const pr = project(p);
      const glow = 0.16 + pr.s * 1.8;
      const fade = clamp((p.z - 0.1) / 2.3, 0, 1);
      const cross = 0.15 + 0.85 * illusion;

      ctx.beginPath();
      const radius = 0.5 + pr.s * (p.kind === 0 ? 6 : 3.7);
      ctx.arc(pr.x, pr.y, radius, 0, TAU);
      ctx.fillStyle = `rgba(208,220,245,${0.04 + glow * 0.12 * p.life * (1 - fade)})`;
      ctx.fill();

      if (p.kind % 2 === 0 && pr.s > 0.42) {
        ctx.beginPath();
        ctx.moveTo(pr.x - radius * 2.5, pr.y);
        ctx.lineTo(pr.x + radius * 2.5, pr.y);
        ctx.moveTo(pr.x, pr.y - radius * 2.5);
        ctx.lineTo(pr.x, pr.y + radius * 2.5);
        ctx.strokeStyle = `rgba(240,248,255,${0.03 + cross * 0.12 * (1 - fade)})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }
  }

  function illusionPulse(seconds) {
    const cycle = 15;
    const local = seconds % cycle;
    const center = 13.5;
    const dist = Math.abs(local - center);
    return clamp(1 - dist / 1.8, 0, 1);
  }

  function frame(now) {
    const ms = now - t0;
    const dt = Math.min(ms, 33);
    t0 = now;
    const t = now * 0.001;

    const illusion = illusionPulse(t);

    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = `rgba(1,1,2,${0.22 + illusion * 0.08})`;
    ctx.fillRect(0, 0, w, h);

    drawRibbon(t, illusion);
    drawGeometryField(t, illusion);

    updateAttractors(t);
    ctx.globalCompositeOperation = 'lighter';
    stepParticles(t, dt, illusion);

    if (illusion > 0.02) {
      ctx.save();
      ctx.globalCompositeOperation = 'difference';
      ctx.fillStyle = `rgba(250,250,250,${illusion * 0.06})`;
      const stripe = 30 - illusion * 12;
      for (let y = -stripe; y < h + stripe; y += stripe * 2) {
        ctx.fillRect(0, y + Math.sin(t * 2 + y * 0.01) * 6, w, stripe);
      }
      ctx.restore();
    }

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
